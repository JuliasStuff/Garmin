name: Garmin sync

on:
  schedule:
    # Hourly at minute 0 (UTC). Cron is best-effort on GitHub-hosted runners.
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # IANA timezone for determining "today". MUST match the user's
          # local timezone, otherwise the UTC runner asks Garmin for
          # tomorrow's data every evening and gets nulls.
          GARMIN_TZ: America/Los_Angeles
        run: python scripts/sync.py
