name: Garmin sync

on:
  schedule:
    # Once a day at 09:00 UTC (~02:00 Pacific): full mode, refreshes the
    # 365-day history and recent activities. This is the ONLY scheduled
    # sync. Live syncs are driven by the PWA itself: it dispatches a
    # workflow_dispatch on open and again every 60s while the app is open.
    # When the app is closed, nothing runs in the background.
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode (live = today only, full = include history + activities)'
        required: false
        default: 'live'
        type: choice
        options:
          - live
          - full

permissions:
  contents: read

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Restore Garmin session
        uses: actions/cache/restore@v4
        with:
          path: ~/.garminconnect
          key: garmin-session-${{ github.run_id }}
          restore-keys: |
            garmin-session-

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: scripts/requirements.txt

      - name: Install dependencies
        run: uv pip install -r scripts/requirements.txt

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # IANA timezone for determining "today". MUST match the user's
          # local timezone, otherwise the UTC runner asks Garmin for
          # tomorrow's data every evening and gets nulls.
          GARMIN_TZ: America/Los_Angeles
          # Pick the sync mode: dispatch input wins, otherwise the cron
          # schedule decides (daily 09:00 UTC → full, all others → live).
          SYNC_MODE: ${{ github.event.inputs.mode || (github.event.schedule == '0 9 * * *' && 'full') || 'live' }}
        run: uv run python scripts/sync.py

      - name: Save Garmin session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.garminconnect
          key: garmin-session-${{ github.run_id }}
